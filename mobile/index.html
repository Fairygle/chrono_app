<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F2F4F7" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>ChronoApp</title>
<style>
  :root{
    --bg:#F2F4F7; --surface:#FFFFFF; --surface2:#E9EDF2; --line:#C7D0DB;
    --text:#17202E; --muted:#5A6678; --teal:#0B8F84; --amber:#B26E00; --red:#C62828;
    --scrim:rgba(20,26,36,.45);
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  html[data-theme="dark"]{
    --bg:#12151C; --surface:#1C212B; --surface2:#242B37; --line:#2E3644;
    --text:#E8EAED; --muted:#9AA4B5; --teal:#3DD6C4; --amber:#F5A623; --red:#E5484D;
    --scrim:rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  button{font-family:inherit;color:inherit}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:Impact,Haettenschweiler,'Arial Narrow Bold','Franklin Gothic Medium',sans-serif;
    letter-spacing:.02em;}
  body{padding-bottom:calc(96px + var(--safe-b));min-height:100vh}
  .mono{font-variant-numeric:tabular-nums}
  .skip{position:absolute;left:-999px;top:0;background:var(--teal);color:#fff;padding:10px 14px;z-index:100;font-weight:700}
  .skip:focus{left:0}

  header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);
    padding:calc(10px + var(--safe-t)) 12px 10px;display:flex;align-items:center;gap:10px}
  #menuBtn{width:44px;height:44px;background:var(--surface);border:1px solid var(--line);font-size:18px}
  header h1{font-size:19px;margin:0;letter-spacing:.14em;text-transform:uppercase;font-weight:700;flex:1}
  header h1 .dot{color:var(--amber)}
  .active-pill{font-size:12px;color:var(--muted);border:1px solid var(--line);
    padding:6px 11px;white-space:nowrap;background:var(--surface);min-height:34px}
  .active-pill[aria-pressed="true"]{background:var(--teal);color:#fff;border-color:var(--teal)}
  .active-pill.live{color:var(--amber);border-color:var(--amber)}

  /* Sidebar : réglages uniquement */
  #sidebar{position:fixed;top:0;bottom:0;left:0;width:270px;z-index:50;
    background:var(--surface);border-right:1px solid var(--line);
    padding:calc(14px + var(--safe-t)) 12px 20px;overflow-y:auto;
    transform:translateX(-105%);transition:transform .18s ease}
  #sidebar.open{transform:none}
  #sidebar h2{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin:18px 0 8px}
  #sidebar h2:first-child{margin-top:4px}
  .side-btn{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;
    background:none;border:1px solid var(--line);padding:12px;min-height:48px;
    font-size:14px;font-weight:600;margin-bottom:6px}
  .side-btn .state{font-size:12px;color:var(--muted)}
  .side-btn[aria-pressed="true"] .state{color:var(--teal)}
  #sidebarScrim{position:fixed;inset:0;background:var(--scrim);z-index:45;display:none}
  #sidebarScrim.show{display:block}
  @media (prefers-reduced-motion:reduce){#sidebar{transition:none}}

  main{padding:8px 12px 0}
  .tabbar{display:flex;gap:6px;padding:6px 0 12px}
  .tab{flex:1;text-align:center;padding:12px 8px;font-size:14px;font-weight:700;min-height:48px;
    color:var(--muted);background:var(--surface);border:1px solid var(--line)}
  .tab[aria-selected="true"]{color:var(--text);border-color:var(--teal);border-bottom:3px solid var(--teal)}

  .group-h{font-size:13px;color:var(--teal);text-transform:uppercase;letter-spacing:.12em;
    margin:16px 2px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .group-h .tot{color:var(--muted);text-transform:none;letter-spacing:0}
  .collapse-btn{width:26px;height:26px;flex:0 0 auto;background:var(--surface);border:1px solid var(--line);
    font-size:11px;transition:transform .12s}
  .collapse-btn.open{transform:rotate(90deg)}
  .icon-btn{width:34px;height:34px;background:var(--surface);border:1px solid var(--line);font-size:13px}

  .card{background:var(--surface);border:1px solid var(--line);margin-bottom:10px;overflow:hidden}
  .row{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row.running{box-shadow:inset 3px 0 0 var(--amber)}
  .row.done .name{text-decoration:line-through;color:var(--muted)}
  .row.done{opacity:.7}
  .chk{width:24px;height:24px;flex:0 0 auto;accent-color:var(--teal)}
  .meta{flex:1;min-width:0}
  .name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .time{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px}
  .time .val{color:var(--text)}
  .over-flag{color:var(--red);font-weight:700;font-size:10px;letter-spacing:.04em}
  .reclight{width:8px;height:8px;background:var(--amber);flex:0 0 auto;
    box-shadow:0 0 0 0 rgba(245,166,35,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(245,166,35,.5)}70%{box-shadow:0 0 0 7px rgba(245,166,35,0)}100%{box-shadow:0 0 0 0 rgba(245,166,35,0)}}
  @media (prefers-reduced-motion:reduce){.reclight{animation:none}}
  .bar{height:3px;background:var(--line);margin-top:8px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--teal)}
  .bar.over > i{background:var(--red)}
  .play{flex:0 0 auto;width:44px;height:44px;border:1px solid var(--line);
    background:var(--surface2);font-size:14px;display:grid;place-items:center}
  .play.on{background:var(--amber);color:#1a1206;border-color:var(--amber)}
  .play[disabled]{opacity:.35}
  .kebab{flex:0 0 auto;width:36px;height:44px;background:none;border:none;color:var(--muted);font-size:20px}

  .empty{color:var(--muted);text-align:center;padding:44px 24px;font-size:15px;line-height:1.5}
  .empty b{color:var(--text)}

  /* Dashboard budget */
  .gtotal{display:flex;justify-content:space-between;align-items:center;
    background:var(--surface);border:1px solid var(--line);padding:12px;margin-bottom:10px}
  .gtotal .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .gtotal .v{font-size:20px;font-weight:700}
  .ghead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:12px 12px 2px}
  .gname{font-size:13px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;
    min-width:0;overflow-wrap:anywhere}
  .gtot{font-size:15px;font-weight:700;flex:0 0 auto}
  .gsub{font-size:11px;color:var(--muted);padding:0 12px}
  .gsub .neg{color:var(--red);font-weight:700}
  .gsub .pos{color:var(--teal);font-weight:700}
  .gproj-bar{margin:8px 12px 12px}
  .gtask{padding:9px 12px 10px;border-top:1px solid var(--line)}
  .gline{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .tname{font-size:14px;font-weight:600;min-width:0;overflow-wrap:anywhere}
  .gtask.done .tname{text-decoration:line-through;color:var(--muted)}
  .ttime{font-size:11px;color:var(--muted);flex:0 0 auto}
  .ttime .neg{color:var(--red);font-weight:700}
  .gbar{height:12px;background:var(--surface2);position:relative;margin-top:6px}
  .gproj-bar .gbar{height:16px}
  .gbar > i{position:absolute;left:0;top:0;bottom:0;min-width:2px}
  .gbar > i.ok{background:var(--teal)}
  .gbar > i.warn{background:var(--amber)}
  .gbar > i.over{background:var(--red)}
  .gbar > i.rel{background:var(--teal);opacity:.55}
  .gpct{font-size:10px;color:var(--muted);margin-top:3px}
  .glegend{font-size:11px;color:var(--muted);margin:0 2px 12px;line-height:1.5}
  .glegend b{color:var(--red)}

  .fab{position:fixed;right:14px;bottom:calc(18px + var(--safe-b));z-index:36;
    background:var(--teal);color:#fff;border:none;padding:15px 20px;min-height:48px;
    font-size:15px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.28)}

  .scrim{position:fixed;inset:0;background:var(--scrim);z-index:60;display:none;align-items:flex-end}
  .scrim.show{display:flex}
  .sheet{width:100%;background:var(--surface);padding:20px 18px calc(20px + var(--safe-b));border-top:1px solid var(--line)}
  @media (min-width:900px){.scrim{align-items:center;justify-content:center}
    .sheet{max-width:460px;border:1px solid var(--line)}}
  .sheet h2{margin:2px 0 16px;font-size:17px}
  .sheet label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.06em}
  .sheet input,.sheet select{width:100%;background:var(--surface2);border:1px solid var(--line);
    color:var(--text);font-size:16px;padding:13px 12px;font-family:inherit}
  .est-row{display:flex;gap:8px}
  .est-row input{flex:1}
  .est-row select{flex:0 0 130px}
  .sheet .hint{font-size:12px;color:var(--muted);margin-top:6px}
  .sheet .actions{display:flex;gap:10px;margin-top:20px}
  .btn{flex:1;padding:14px;min-height:48px;font-size:15px;font-weight:700;border:1px solid var(--line);background:var(--surface2)}
  .btn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}
  .menu .sheet button.mi{display:block;width:100%;text-align:left;background:none;border:none;
    font-size:16px;padding:15px 4px;min-height:48px;border-bottom:1px solid var(--line)}
  .menu .sheet button.mi.del{color:var(--red)}
  .menu .sheet button.mi:last-child{border-bottom:none}
</style>
</head>
<body>
<a class="skip" href="#main">Aller au contenu</a>

<header>
  <button id="menuBtn" aria-label="Ouvrir les paramètres" aria-expanded="false" aria-controls="sidebar">☰</button>
  <h1>Chrono<span class="dot">·</span>App</h1>
  <button id="pill" class="active-pill" aria-pressed="false">0 active</button>
</header>

<div id="sidebarScrim"></div>
<nav id="sidebar" aria-label="Paramètres">
  <h2>Export</h2>
  <button class="side-btn" id="expCsv"><span>Exporter en CSV</span><span class="state">↓</span></button>
  <button class="side-btn" id="expJson"><span>Exporter en JSON</span><span class="state">↓</span></button>
  <button class="side-btn" id="impJson"><span>Importer un JSON</span><span class="state">↑</span></button>
  <input type="file" id="impFile" accept=".json,application/json" style="display:none" aria-hidden="true" />
  <button class="side-btn" id="shareBtn"><span>Partager le récapitulatif</span><span class="state">➦</span></button>

  <h2>Affichage</h2>
  <button class="side-btn" id="setTheme"><span>Mode sombre</span><span class="state"></span></button>
  <button class="side-btn" id="setDecimal"><span>Temps en décimal (1,25 h)</span><span class="state"></span></button>
  <button class="side-btn" id="setAwake"><span>Écran allumé si timer actif</span><span class="state"></span></button>
</nav>

<main id="main">
  <div class="tabbar" role="tablist" aria-label="Vues">
    <button class="tab" id="tabTasks" role="tab" aria-selected="true">Tâches</button>
    <button class="tab" id="tabDash" role="tab" aria-selected="false">Dashboard</button>
  </div>
  <div id="list"></div>
</main>

<button class="fab" id="fab">+ Tâche</button>

<!-- Création / édition de tâche -->
<div class="scrim" id="editScrim">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <h2 id="editTitle">Nouvelle tâche</h2>
    <label for="editName">Nom de la tâche</label>
    <input id="editName" placeholder="Ex. Maquette page d'accueil" autocomplete="off" />
    <label for="editProj">Projet</label>
    <select id="editProj"></select>
    <div id="newProjBlock" style="display:none">
      <label for="newProjName">Nom du nouveau projet</label>
      <input id="newProjName" placeholder="Ex. Client X" autocomplete="off" />
    </div>
    <label for="editEst">Temps estimé (optionnel — 0 = aucun)</label>
    <div class="est-row">
      <input id="editEst" type="number" inputmode="numeric" min="0" value="0" />
      <select id="editUnit" aria-label="Unité du temps estimé">
        <option value="1" selected>minutes</option>
        <option value="60">heures</option>
        <option value="1440">jours</option>
      </select>
    </div>
    <div class="hint">Si le temps passé dépasse l'estimation, la tâche passe en rouge.</div>
    <div class="actions">
      <button class="btn" id="editCancel">Annuler</button>
      <button class="btn primary" id="editSave">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Menu tâche -->
<div class="scrim menu" id="menuScrim">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <h2 id="menuTitle">Options</h2>
    <button class="mi" id="miEdit">Modifier (nom, projet, estimation)</button>
    <button class="mi" id="miReset">Remettre le compteur à zéro</button>
    <button class="mi del" id="miDelete">Supprimer la tâche</button>
    <button class="mi" id="miClose">Fermer</button>
  </div>
</div>

<script>
"use strict";
const KEY = "chronoapp.v1";   // inchangé : les données survivent aux mises à jour
const SCHEMA = 4;
const uid = () => Math.random().toString(36).slice(2, 10);

// ---- Migration : les sous-tâches d'anciennes versions sont fusionnées dans leur tâche ----
function migrate(raw){
  const s = (raw && typeof raw === "object") ? raw : {};
  const out = { schema: SCHEMA, projects: [] };
  const st = (s.settings && typeof s.settings === "object") ? s.settings : {};
  out.settings = { theme: st.theme === "dark" ? "dark" : "light", decimal: !!st.decimal,
                   keepAwake: !!st.keepAwake };
  for(const p of (Array.isArray(s.projects) ? s.projects : [])){
    const np = { id: (p && p.id) || uid(), name: String((p && p.name) || "Projet"), tasks: [] };
    for(const t of (Array.isArray(p && p.tasks) ? p.tasks : [])){
      const node = (t && typeof t === "object") ? t : {};
      let elapsed = Number(node.elapsed) || 0;
      if(node.running && node.startedAt) elapsed += (Date.now() - node.startedAt) / 1000;
      let est = Math.max(0, Number(node.estimate_min) || 0);
      for(const sub of (Array.isArray(node.subtasks) ? node.subtasks : [])){
        let sel = Number(sub && sub.elapsed) || 0;
        if(sub && sub.running && sub.startedAt) sel += (Date.now() - sub.startedAt) / 1000;
        elapsed += sel;
        est += Math.max(0, Number(sub && sub.estimate_min) || 0);
      }
      np.tasks.push({ id: node.id || uid(), name: String(node.name || "Sans nom"),
                      estimate_min: est, elapsed, running: false, done: !!node.done });
    }
    out.projects.push(np);
  }
  return out;
}
const GAP_LIMIT = 4 * 3600 * 1000;   // au-dela de 4 h d'absence, on demande confirmation

function handleRecovery(parsed, st){
  // Des timers tournaient quand l'app a ete fermee / tuee par le systeme.
  // Veille d'ecran courte -> on reprend sans rien demander.
  // Longue absence -> on demande s'il faut conserver ce temps (timer oublie ?).
  try{
    const runIds = [];
    for(const p of ((parsed && parsed.projects) || []))
      for(const t of ((p && p.tasks) || []))
        if(t && t.running && t.startedAt) runIds.push(t.id);
    if(!runIds.length) return st;
    const now = Date.now();
    const lastSeen = Number(parsed.lastSeen) || now;
    const gap = Math.max(0, now - lastSeen);
    const tasks = [];
    for(const p of st.projects) for(const t of p.tasks) if(runIds.includes(t.id)) tasks.push(t);
    if(gap > GAP_LIMIT){
      const h = Math.round(gap / 3600000 * 10) / 10;
      const keep = confirm(
        `⏱ ${tasks.length} tâche(s) tournaient encore quand l'app a été fermée, il y a environ ${String(h).replace(".", ",")} h.\n\n` +
        `OK = conserver ce temps et continuer le chrono.\nAnnuler = retirer ce temps (timer oublié) et mettre en pause.`);
      if(!keep){
        for(const t of tasks) t.elapsed = Math.max(0, t.elapsed - gap / 1000);
        return st;
      }
    }
    for(const t of tasks){ t.running = true; t.startedAt = now; }
  }catch(e){}
  return st;
}

function load(){
  let raw = null;
  try{ raw = localStorage.getItem(KEY); }catch(e){}
  if(raw){
    try{ localStorage.setItem(KEY + ".backup", raw); }catch(e){}
    try{
      const parsed = JSON.parse(raw);
      return handleRecovery(parsed, migrate(parsed));
    }catch(e){}
  }
  return migrate(null);
}
let saveWarned = false;
function save(){
  try{
    state.lastSeen = Date.now();
    localStorage.setItem(KEY, JSON.stringify(state));
  }catch(e){
    if(!saveWarned){ saveWarned = true;
      alert("⚠ Impossible d'enregistrer les données (stockage plein ou navigation privée)."); }
  }
}

let state = load();
let view = "tasks";
let onlyActive = false;
let collapsed = {};   // { [projectId]: true } = replié
let edit = null;
let menuCtx = null;

// ---- Temps ----
function elapsed(n){
  let e = n.elapsed || 0;
  if(n.running && n.startedAt) e += (Date.now() - n.startedAt) / 1000;
  return e;
}
function over(n){ return n.estimate_min > 0 && elapsed(n) > n.estimate_min * 60; }
function hms(s){
  s = Math.max(0, Math.floor(s));
  const j = Math.floor(s/86400), h = Math.floor((s%86400)/3600),
        m = Math.floor((s%3600)/60), x = s%60;
  const p = n => String(n).padStart(2,"0");
  if(j > 0) return `${j}j ${p(h)}h ${p(m)}m`;
  if(h > 0) return `${h}h ${p(m)}m ${p(x)}s`;
  return `${m}m ${p(x)}s`;
}
function disp(s){
  if(state.settings.decimal) return (s/3600).toFixed(2).replace(".", ",") + " h";
  return hms(s);
}
function bestUnit(estMin){
  if(estMin > 0 && estMin % 1440 === 0) return { v: estMin/1440, u: 1440 };
  if(estMin > 0 && estMin % 60 === 0)   return { v: estMin/60,   u: 60 };
  return { v: estMin, u: 1 };
}
function projTotal(p){ return p.tasks.reduce((a,t) => a + elapsed(t), 0); }
function findTask(id){
  for(const p of state.projects)
    for(const t of p.tasks) if(t.id === id) return {p, t};
  return null;
}
function foldRunning(){
  const now = Date.now(); let any = false;
  for(const p of state.projects) for(const t of p.tasks){
    if(t.running && t.startedAt){
      const d = (now - t.startedAt) / 1000;
      if(d > 0){ t.elapsed += d; t.startedAt = now; any = true; }
    }
  }
  return any;
}

// ---- Actions ----
function toggle(id){
  const f = findTask(id); if(!f || f.t.done) return;
  foldRunning();
  if(f.t.running){ f.t.running = false; delete f.t.startedAt; }
  else { f.t.running = true; f.t.startedAt = Date.now(); }
  save(); render();
}
function setDone(id, done){
  const f = findTask(id); if(!f) return;
  foldRunning();
  f.t.done = done;
  if(done){ f.t.running = false; delete f.t.startedAt; }
  save(); render();
}
function deleteTask(id){
  const f = findTask(id); if(!f) return;
  f.p.tasks = f.p.tasks.filter(t => t.id !== id);
  save(); render();
}
function renameProject(pid){
  const p = state.projects.find(x => x.id === pid); if(!p) return;
  const name = prompt("Nom du projet :", p.name);
  if(name && name.trim()){ p.name = name.trim(); save(); render(); }
}
function deleteProject(pid){
  const p = state.projects.find(x => x.id === pid); if(!p) return;
  if(!confirm(`Supprimer le projet « ${p.name} » et ses ${p.tasks.length} tâche(s) ?`)) return;
  state.projects = state.projects.filter(x => x.id !== pid);
  save(); render();
}

// ---- Export ----
function download(name, text, type){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], {type: type || "text/plain;charset=utf-8"}));
  a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
}
function csvEscape(v){ return '"' + String(v).replace(/"/g, '""') + '"'; }
function today(){ const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function exportCsv(){
  foldRunning();
  const rows = [["Projet","Tache","Passe (s)","Passe","Estime (min)","Terminee"]];
  for(const p of state.projects) for(const t of p.tasks)
    rows.push([p.name, t.name, Math.round(elapsed(t)), hms(elapsed(t)), t.estimate_min, t.done ? "oui" : "non"]);
  download("chronoapp-" + today() + ".csv",
    "\uFEFF" + rows.map(r => r.map(csvEscape).join(";")).join("\r\n"), "text/csv;charset=utf-8");
}
function exportJson(){
  foldRunning(); save();
  download("chronoapp-" + today() + ".json", JSON.stringify(state, null, 2), "application/json");
}
function importJson(file){
  const r = new FileReader();
  r.onload = () => {
    try{
      const parsed = JSON.parse(r.result);
      const nb = Array.isArray(parsed.projects) ? parsed.projects.length : 0;
      if(!confirm(`Remplacer les données actuelles par ce fichier (${nb} projet(s)) ?\nUn backup de l'état actuel sera conservé.`)) return;
      try{ localStorage.setItem(KEY + ".backup", JSON.stringify(state)); }catch(e){}
      state = migrate(parsed);
      save(); render();
      alert("Import réussi ✓");
    }catch(e){ alert("Fichier illisible : " + e.message); }
  };
  r.readAsText(file);
}
function buildRecap(){
  foldRunning();
  const lines = ["ChronoApp — récapitulatif du " + today(), ""];
  const projs = state.projects.map(p => ({p, tot: projTotal(p)})).sort((a,b) => b.tot - a.tot);
  for(const g of projs){
    lines.push(g.p.name.toUpperCase() + " — " + disp(g.tot));
    const tasks = [...g.p.tasks].sort((a,b) => elapsed(b) - elapsed(a));
    for(const t of tasks){
      let l = "  • " + t.name + " : " + disp(elapsed(t));
      if(t.estimate_min > 0) l += " / " + disp(t.estimate_min*60) + (over(t) ? "  ⚠ DÉPASSÉ" : "");
      if(t.done) l += " ✓";
      lines.push(l);
    }
    lines.push("");
  }
  const total = projs.reduce((a,g) => a + g.tot, 0);
  lines.push("TOTAL : " + disp(total));
  return lines.join("\n");
}
async function shareRecap(){
  const text = buildRecap();
  if(navigator.share){
    try{ await navigator.share({title: "ChronoApp — temps par projet", text}); return; }
    catch(e){ if(e && e.name === "AbortError") return; }
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{ await navigator.clipboard.writeText(text); alert("Récapitulatif copié dans le presse-papiers ✓"); return; }catch(e){}
  }
  download("chronoapp-recap-" + today() + ".txt", text);
}

// ---- Feuilles ----
function fillProjSelect(selected){
  const sel = document.getElementById("editProj");
  sel.innerHTML = state.projects.map(p =>
    `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("") +
    `<option value="__new">+ Nouveau projet…</option>`;
  sel.value = selected && state.projects.some(p => p.id === selected) ? selected : (state.projects[0] ? state.projects[0].id : "__new");
  document.getElementById("newProjBlock").style.display = sel.value === "__new" ? "" : "none";
}
function openEdit(task){
  edit = task ? {kind:"edit", id:task.id} : {kind:"new"};
  document.getElementById("editTitle").textContent = task ? "Modifier la tâche" : "Nouvelle tâche";
  document.getElementById("editName").value = task ? task.name : "";
  document.getElementById("newProjName").value = "";
  const f = task ? findTask(task.id) : null;
  fillProjSelect(f ? f.p.id : null);
  const b = bestUnit(task ? task.estimate_min : 0);
  document.getElementById("editEst").value = b.v;
  document.getElementById("editUnit").value = String(b.u);
  document.getElementById("editScrim").classList.add("show");
  setTimeout(() => document.getElementById("editName").focus(), 60);
}
function closeEdit(){ document.getElementById("editScrim").classList.remove("show"); edit = null; }
function commitEdit(){
  if(!edit) return;
  const name = document.getElementById("editName").value.trim();
  if(!name){ document.getElementById("editName").focus(); return; }
  let pid = document.getElementById("editProj").value;
  if(pid === "__new"){
    const pn = document.getElementById("newProjName").value.trim();
    if(!pn){ document.getElementById("newProjName").focus(); return; }
    const p = {id: uid(), name: pn, tasks: []};
    state.projects.push(p); pid = p.id;
  }
  const val = parseFloat(document.getElementById("editEst").value);
  const unit = parseInt(document.getElementById("editUnit").value, 10);
  const est = (val >= 0) ? Math.round(val * unit) : 0;
  const dest = state.projects.find(p => p.id === pid);

  if(edit.kind === "new"){
    dest.tasks.push({id: uid(), name, estimate_min: est, elapsed: 0, running: false, done: false});
  } else {
    const f = findTask(edit.id);
    if(f){
      f.t.name = name; f.t.estimate_min = est;
      if(f.p.id !== pid){ f.p.tasks = f.p.tasks.filter(t => t.id !== f.t.id); dest.tasks.push(f.t); }
    }
  }
  closeEdit(); save(); render();
}
function openMenu(id){
  const f = findTask(id); if(!f) return;
  menuCtx = id;
  document.getElementById("menuTitle").textContent = f.t.name;
  document.getElementById("menuScrim").classList.add("show");
  setTimeout(() => document.getElementById("miEdit").focus(), 60);
}
function closeMenu(){ document.getElementById("menuScrim").classList.remove("show"); menuCtx = null; }

// ---- Sidebar ----
function openSidebar(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebarScrim").classList.add("show");
  document.getElementById("menuBtn").setAttribute("aria-expanded","true");
  document.getElementById("expCsv").focus();
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarScrim").classList.remove("show");
  document.getElementById("menuBtn").setAttribute("aria-expanded","false");
}

// ---- Rendu ----
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function taskRow(t){
  const el = elapsed(t), ov = over(t);
  const pct = t.estimate_min > 0 ? Math.min(100, (el/(t.estimate_min*60))*100) : 0;
  return `<div class="row ${t.running?'running':''} ${t.done?'done':''}">
    <input type="checkbox" class="chk" data-done="${t.id}" ${t.done?'checked':''}
      aria-label="Marquer ${escapeHtml(t.name)} comme ${t.done?'à faire':'terminée'}" />
    <div class="meta">
      <div class="name">${escapeHtml(t.name)}</div>
      <div class="time">
        ${t.running?'<span class="reclight" aria-hidden="true"></span>':''}
        <span class="val mono">${disp(el)}</span>
        ${t.estimate_min>0?`<span class="mono">/ ${disp(t.estimate_min*60)}</span>`:''}
        ${ov?'<span class="over-flag">DÉPASSÉ</span>':''}
      </div>
      ${t.estimate_min>0?`<div class="bar ${ov?'over':''}"><i style="width:${pct}%"></i></div>`:''}
    </div>
    <button class="play ${t.running?'on':''}" data-toggle="${t.id}" ${t.done?'disabled':''}
      aria-label="${t.running?'Mettre en pause':'Démarrer'} ${escapeHtml(t.name)}" aria-pressed="${t.running}">${t.running?'❚❚':'▶'}</button>
    <button class="kebab" data-menu="${t.id}" aria-label="Options pour ${escapeHtml(t.name)}">⋮</button>
  </div>`;
}

function render(){
  document.documentElement.dataset.theme = state.settings.theme;
  const mtc = document.querySelector('meta[name="theme-color"]');
  if(mtc) mtc.content = state.settings.theme === "dark" ? "#12151C" : "#F2F4F7";
  const setBtn = (id, on) => {
    const b = document.getElementById(id);
    b.setAttribute("aria-pressed", String(on));
    b.querySelector(".state").textContent = on ? "activé ✓" : "désactivé";
  };
  setBtn("setTheme", state.settings.theme === "dark");
  setBtn("setDecimal", state.settings.decimal);
  setBtn("setAwake", state.settings.keepAwake);
  updateWakeLock();

  document.getElementById("tabTasks").setAttribute("aria-selected", String(view === "tasks"));
  document.getElementById("tabDash").setAttribute("aria-selected", String(view === "dash"));

  const list = document.getElementById("list");

  if(view === "dash"){
    // ---- Dashboard : consommation du budget par projet et par tâche ----
    const groups = state.projects
      .map(p => ({p, tot: projTotal(p), est: p.tasks.reduce((a,t) => a + t.estimate_min*60, 0)}))
      .sort((a,b) => b.tot - a.tot);
    const grand = groups.reduce((a,g) => a + g.tot, 0);
    if(!groups.length || grand < 1){
      list.innerHTML = `<div class="empty"><b>Rien à afficher.</b><br>Chronomètre des tâches pour alimenter le dashboard.</div>`;
    } else {
      // Barre budget : l'estimation = 100 % de la largeur
      const budgetBar = (el, est, big) => {
        const pct = Math.min(100, el/est*100);
        const cls = el > est ? "over" : (el/est >= 0.75 ? "warn" : "ok");
        return `<div class="gbar"><i class="${cls}" style="width:${pct.toFixed(1)}%"></i></div>
                <div class="gpct mono">${Math.round(el/est*100)} % de l'estimation${el>est?` — <span style="color:var(--red);font-weight:700">dépassée de ${disp(el-est)}</span>`:''}</div>`;
      };
      // Barre relative (pas d'estimation) : comparée au plus long du groupe
      const relBar = (el, ref) => `<div class="gbar"><i class="rel" style="width:${Math.max(1, el/Math.max(1,ref)*100).toFixed(1)}%"></i></div>`;

      const gGroups = onlyActive ? groups.filter(g => g.p.tasks.some(t => t.running)) : groups;
      list.innerHTML =
        `<div class="gtotal"><span class="k">Total suivi</span><span class="v mono">${disp(grand)}</span></div>
         <div class="glegend">La barre montre la part de l'estimation consommée :
           vert &lt; 75 % · ambre 75-100 % · <b>rouge = dépassé</b> (écart affiché).
           Sans estimation, la barre compare simplement les durées entre elles.
           ${onlyActive ? ` · Filtre actif : <button class="icon-btn" id="clearFilter" style="width:auto;padding:4px 8px">tout afficher</button>` : ''}</div>` +
        (!gGroups.length ? `<div class="empty">Rien d'actif en ce moment.</div>` : gGroups.map(g => {
          const closed = !!collapsed[g.p.id];
          const tasksAll = [...g.p.tasks].sort((a,b) => elapsed(b) - elapsed(a));
          const tasks = onlyActive ? tasksAll.filter(t => t.running) : tasksAll;
          const maxTask = Math.max(1, ...g.p.tasks.map(t => elapsed(t)));
          const dOver = g.est > 0 && g.tot > g.est;
          return `<section aria-label="Projet ${escapeHtml(g.p.name)}"><div class="card">
            <div class="ghead">
              <button class="collapse-btn ${closed?'':'open'}" data-collapse="${g.p.id}"
                aria-expanded="${!closed}" aria-label="${closed?'Déplier':'Replier'} ${escapeHtml(g.p.name)}">▶</button>
              <span class="gname" style="flex:1">${escapeHtml(g.p.name)}</span>
              <span class="gtot mono">${disp(g.tot)}</span></div>
            ${closed ? '' : `
            ${g.est > 0 ? `<div class="gsub mono">estimé ${disp(g.est)} · écart
                <span class="${dOver?'neg':'pos'}">${(g.tot>=g.est?'+':'-') + disp(Math.abs(g.tot-g.est))}</span></div>
              <div class="gproj-bar">${budgetBar(g.tot, g.est, true)}</div>`
            : `<div class="gproj-bar">${relBar(g.tot, Math.max(1, groups[0].tot))}</div>`}
            ${tasks.length ? tasks.map(t => {
              const el = elapsed(t);
              return `<div class="gtask ${t.done?'done':''}">
                <div class="gline"><span class="tname">${escapeHtml(t.name)}${t.done?' ✓':''}</span>
                  <span class="ttime mono">${disp(el)}${t.estimate_min>0?` / ${disp(t.estimate_min*60)}`:''}${over(t)?` <span class="neg">+${disp(el-t.estimate_min*60)}</span>`:''}</span></div>
                ${t.estimate_min > 0 ? budgetBar(el, t.estimate_min*60) : relBar(el, maxTask)}
              </div>`;
            }).join("") : (onlyActive ? `<div class="empty">Aucune tâche active dans ce projet.</div>` : '')}
            `}
          </div></section>`;
        }).join(""));
    }
  } else {
    // ---- Tâches groupées par projet (pliables, filtrables sur "actives") ----
    if(!state.projects.length){
      list.innerHTML = `<div class="empty"><b>Aucune tâche.</b><br>Touche « + Tâche » : tu pourras créer le projet en même temps.</div>`;
    } else {
      const shown = onlyActive ? state.projects.filter(p => p.tasks.some(t => t.running)) : state.projects;
      if(!shown.length){
        list.innerHTML = `<div class="empty"><b>Rien d'actif en ce moment.</b><br>Touche à nouveau le bandeau en haut pour tout réafficher.</div>`;
      } else {
        list.innerHTML =
          (onlyActive ? `<div class="glegend">Filtre actif : seuls les projets avec une tâche en cours sont affichés ·
             <button class="icon-btn" id="clearFilter" style="width:auto;padding:4px 8px">tout afficher</button></div>` : '') +
          shown.map(p => {
            const closed = !!collapsed[p.id];
            const tasksToShow = onlyActive ? p.tasks.filter(t => t.running) : p.tasks;
            const tot = projTotal(p);
            return `<section aria-label="Projet ${escapeHtml(p.name)}">
              <h2 class="group-h">
                <button class="collapse-btn ${closed?'':'open'}" data-collapse="${p.id}"
                  aria-expanded="${!closed}" aria-label="${closed?'Déplier':'Replier'} ${escapeHtml(p.name)}">▶</button>
                <span style="flex:1;min-width:0;overflow-wrap:anywhere">${escapeHtml(p.name)}</span>
                <span class="tot mono">· ${disp(tot)}</span>
                <button class="icon-btn" data-renameproj="${p.id}" aria-label="Renommer ${escapeHtml(p.name)}">✎</button>
                <button class="icon-btn" data-delproj="${p.id}" aria-label="Supprimer ${escapeHtml(p.name)}" style="color:var(--red)">🗑</button>
              </h2>
              ${closed ? '' : `<div class="card">${tasksToShow.length ? tasksToShow.map(taskRow).join("") :
                `<div class="empty">${onlyActive ? "Aucune tâche active dans ce projet." : "Pas encore de tâche."}</div>`}</div>`}
            </section>`;
          }).join("");
      }
    }
  }

  const running = state.projects.flatMap(p => p.tasks).filter(t => t.running);
  const pill = document.getElementById("pill");
  pill.className = "active-pill" + (running.length ? " live" : "");
  pill.setAttribute("aria-pressed", String(onlyActive));
  pill.textContent = `${running.length} active${running.length>1?'s':''}`;
  pill.title = running.length ? "Afficher seulement les projets/tâches actifs" : "Aucune tâche active";
}

// ---- Événements ----
document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-toggle],[data-menu],[data-renameproj],[data-delproj],[data-collapse],#clearFilter");
  if(!t) return;
  if(t.dataset.toggle) toggle(t.dataset.toggle);
  else if(t.dataset.menu) openMenu(t.dataset.menu);
  else if(t.dataset.renameproj) renameProject(t.dataset.renameproj);
  else if(t.dataset.delproj) deleteProject(t.dataset.delproj);
  else if(t.dataset.collapse){ collapsed[t.dataset.collapse] = !collapsed[t.dataset.collapse]; render(); }
  else if(t.id === "clearFilter"){ onlyActive = false; render(); }
});
document.getElementById("pill").addEventListener("click", () => {
  const running = state.projects.some(p => p.tasks.some(t => t.running));
  if(!running && !onlyActive) return;
  onlyActive = !onlyActive;
  if(onlyActive) view = "tasks";
  render();
});
document.addEventListener("change", (e) => {
  if(e.target.matches("[data-done]")) setDone(e.target.dataset.done, e.target.checked);
});
document.getElementById("menuBtn").onclick = () =>
  document.getElementById("sidebar").classList.contains("open") ? closeSidebar() : openSidebar();
document.getElementById("sidebarScrim").onclick = closeSidebar;
document.getElementById("tabTasks").onclick = () => { view = "tasks"; render(); };
document.getElementById("tabDash").onclick  = () => { view = "dash"; render(); };
document.getElementById("fab").onclick = () => openEdit(null);

document.getElementById("setTheme").onclick = () => {
  state.settings.theme = state.settings.theme === "dark" ? "light" : "dark"; save(); render(); };
document.getElementById("setDecimal").onclick = () => {
  state.settings.decimal = !state.settings.decimal; save(); render(); };
document.getElementById("setAwake").onclick = () => {
  state.settings.keepAwake = !state.settings.keepAwake; save(); render(); };
document.getElementById("expCsv").onclick = exportCsv;
document.getElementById("expJson").onclick = exportJson;
document.getElementById("impJson").onclick = () => document.getElementById("impFile").click();
document.getElementById("impFile").addEventListener("change", (e) => {
  if(e.target.files && e.target.files[0]) importJson(e.target.files[0]);
  e.target.value = "";
});
document.getElementById("shareBtn").onclick = shareRecap;

document.getElementById("editProj").addEventListener("change", (e) => {
  document.getElementById("newProjBlock").style.display = e.target.value === "__new" ? "" : "none";
  if(e.target.value === "__new") setTimeout(() => document.getElementById("newProjName").focus(), 40);
});
document.getElementById("editCancel").onclick = closeEdit;
document.getElementById("editSave").onclick = commitEdit;
document.getElementById("editScrim").addEventListener("click", (e)=>{ if(e.target.id==="editScrim") closeEdit(); });
for(const id of ["editName","newProjName","editEst"])
  document.getElementById(id).addEventListener("keydown", (e)=>{ if(e.key==="Enter") commitEdit(); });

document.getElementById("miEdit").onclick   = () => { const id=menuCtx; closeMenu();
  const f=findTask(id); if(f) openEdit(f.t); };
document.getElementById("miReset").onclick  = () => { const id=menuCtx; closeMenu();
  if(confirm("Remettre le compteur à zéro ?")){ const f=findTask(id);
    if(f){ f.t.elapsed=0; f.t.running=false; delete f.t.startedAt; save(); render(); } } };
document.getElementById("miDelete").onclick = () => { const id=menuCtx; const f=findTask(id); closeMenu();
  if(confirm(`Supprimer « ${f?f.t.name:''} » ?`)) deleteTask(id); };
document.getElementById("miClose").onclick  = closeMenu;
document.getElementById("menuScrim").addEventListener("click",(e)=>{ if(e.target.id==="menuScrim") closeMenu(); });

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape"){ closeEdit(); closeMenu(); closeSidebar(); }
});

// ---- Wake Lock : ecran maintenu allume si demande et timer actif ----
let wakeLock = null;
function anyRunning(){ return state.projects.some(p => p.tasks.some(t => t.running)); }
async function updateWakeLock(){
  const want = state.settings.keepAwake && anyRunning() &&
               typeof document !== "undefined" && document.visibilityState === "visible";
  if(want && !wakeLock && navigator.wakeLock){
    try{
      wakeLock = await navigator.wakeLock.request("screen");
      wakeLock.addEventListener("release", () => { wakeLock = null; });
    }catch(e){ wakeLock = null; }
  } else if(!want && wakeLock){
    try{ wakeLock.release(); }catch(e){}
    wakeLock = null;
  }
}

// ---- Boucle 1 s ----
setInterval(() => { if(foldRunning()){ save(); render(); } }, 1000);

// ---- Fermeture ----
window.addEventListener("beforeunload", (e) => {
  foldRunning(); save();
  if(state.projects.some(p => p.tasks.some(t => t.running))){
    e.preventDefault();
    e.returnValue = "Des tâches sont encore actives. Quitter ?";
    return e.returnValue;
  }
});
document.addEventListener("visibilitychange", () => {
  if(document.hidden){ foldRunning(); save(); }
  else { foldRunning(); save(); render(); }   // retour au premier plan : rattraper l'affichage + wake lock
});
window.addEventListener("pagehide", () => { foldRunning(); save(); });   // iOS : plus fiable que beforeunload

// ---- Plusieurs onglets ouverts : se resynchroniser au lieu de s'ecraser ----
window.addEventListener("storage", (e) => {
  if(e.key === KEY && e.newValue){
    try{ state = migrate(JSON.parse(e.newValue)); render(); }catch(err){}
  }
});

if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js", {updateViaCache:"none"})
    .then((reg) => { setInterval(() => reg.update(), 10000); })
    .catch(()=>{});
}

render();
</script>
