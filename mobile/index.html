<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#12151C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>ChronoApp</title>
<style>
  :root{
    --bg:#12151C; --surface:#1C212B; --surface2:#242B37; --line:#2E3644;
    --text:#E8EAED; --muted:#9AA4B5; --teal:#3DD6C4; --amber:#F5A623; --red:#E5484D;
    --sidebar-w:250px;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  button{font-family:inherit}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:Impact,Haettenschweiler,'Arial Narrow Bold','Franklin Gothic Medium',sans-serif;
    letter-spacing:.02em;}
  body{padding-bottom:calc(84px + var(--safe-b));min-height:100vh}
  .mono{font-variant-numeric:tabular-nums}

  .skip{position:absolute;left:-999px;top:0;background:var(--teal);color:var(--bg);
    padding:10px 14px;z-index:100;font-weight:700}
  .skip:focus{left:0}

  header{position:sticky;top:0;z-index:20;background:rgba(18,21,28,.94);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:calc(10px + var(--safe-t)) 12px 10px;display:flex;align-items:center;gap:10px}
  #menuBtn{width:44px;height:44px;background:var(--surface);border:1px solid var(--line);
    color:var(--text);font-size:18px}
  header h1{font-size:19px;margin:0;letter-spacing:.14em;text-transform:uppercase;font-weight:700;flex:1}
  header h1 .dot{color:var(--amber)}
  .active-pill{font-size:12px;color:var(--muted);border:1px solid var(--line);
    padding:6px 11px;white-space:nowrap}
  .active-pill.live{color:var(--amber);border-color:var(--amber)}
  .active-pill.over{color:var(--red);border-color:var(--red)}

  /* ---------- Sidebar ---------- */
  #sidebar{position:fixed;top:0;bottom:0;left:0;width:var(--sidebar-w);z-index:50;
    background:var(--surface);border-right:1px solid var(--line);
    padding:calc(14px + var(--safe-t)) 12px 14px;overflow-y:auto;
    transform:translateX(-105%);transition:transform .18s ease}
  #sidebar.open{transform:none}
  #sidebar h2{font-size:13px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.12em;margin:4px 0 10px}
  #sidebar ul{list-style:none;margin:0;padding:0}
  #sidebar li{margin-bottom:6px}
  .proj-btn{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;
    text-align:left;background:var(--surface2);border:1px solid var(--line);color:var(--text);
    padding:12px;font-size:15px;font-weight:600;min-height:44px}
  .proj-btn[aria-current="true"]{border-color:var(--teal);color:var(--teal)}
  .proj-btn .count{font-size:11px;color:var(--muted)}
  .proj-btn .count.live{color:var(--amber)}
  #sidebar .newproj{width:100%;margin-top:8px;padding:12px;min-height:44px;
    background:none;border:1px dashed var(--teal);color:var(--teal);font-size:14px;font-weight:700}
  #sidebarScrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45;display:none}
  #sidebarScrim.show{display:block}

  main{padding:8px 12px 0}

  @media (min-width:900px){
    #menuBtn,#sidebarScrim{display:none}
    #sidebar{transform:none;top:0;padding-top:80px;z-index:10}
    header{padding-left:calc(var(--sidebar-w) + 16px)}
    main,.fab-holder{margin-left:var(--sidebar-w)}
  }

  .tabbar{display:flex;gap:6px;padding:6px 4px 12px}
  .tab{flex:1;text-align:center;padding:11px;font-size:14px;font-weight:600;min-height:44px;
    color:var(--muted);background:var(--surface);border:1px solid var(--line)}
  .tab[aria-selected="true"]{color:var(--text);background:var(--surface2);border-color:var(--teal)}

  .group-h{font-size:13px;color:var(--teal);text-transform:uppercase;letter-spacing:.12em;
    margin:14px 2px 8px;display:flex;align-items:center;gap:8px}
  .group-h .over-n{color:var(--red)}

  .card{background:var(--surface);border:1px solid var(--line);margin-bottom:10px;overflow:hidden}
  .row{display:flex;align-items:center;gap:10px;padding:12px;position:relative}
  .row.sub{padding-left:26px;background:var(--surface2)}
  .row.sub::before{content:"";position:absolute;left:13px;top:0;bottom:0;width:2px;background:var(--line)}
  .row.running{box-shadow:inset 3px 0 0 var(--amber)}
  .caret{width:30px;height:30px;flex:0 0 auto;color:var(--muted);font-size:11px;
    background:none;border:none;transition:transform .15s}
  .caret.open{transform:rotate(90deg)}
  .caret.empty{opacity:.25}
  .meta{flex:1;min-width:0}
  .name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .name.dim{color:var(--muted)}
  .sub .name{font-size:14px}
  .time{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px}
  .time .val{color:var(--text)}
  .over-flag{color:var(--red);font-weight:700;font-size:10px;letter-spacing:.04em}
  .reclight{width:8px;height:8px;background:var(--amber);flex:0 0 auto;
    box-shadow:0 0 0 0 rgba(245,166,35,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(245,166,35,.55)}70%{box-shadow:0 0 0 7px rgba(245,166,35,0)}100%{box-shadow:0 0 0 0 rgba(245,166,35,0)}}
  @media (prefers-reduced-motion:reduce){.reclight{animation:none}#sidebar{transition:none}}

  .bar{height:3px;background:var(--line);margin-top:8px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--teal);width:0%}
  .bar.over > i{background:var(--red)}

  .play{flex:0 0 auto;width:44px;height:44px;border:1px solid var(--line);
    background:var(--surface2);color:var(--text);font-size:14px;display:grid;place-items:center}
  .play.on{background:var(--amber);color:#1a1206;border-color:var(--amber)}
  .kebab{flex:0 0 auto;width:38px;height:44px;background:none;border:none;color:var(--muted);font-size:20px}

  .addline{width:100%;text-align:left;padding:13px 14px;min-height:44px;background:none;border:none;
    border-top:1px dashed var(--line);color:var(--teal);font-size:14px;font-weight:600}
  .addline.addsub{padding-left:26px}

  .empty{color:var(--muted);text-align:center;padding:48px 24px;font-size:15px;line-height:1.5}
  .empty b{color:var(--text)}

  .fab-holder{position:fixed;right:0;bottom:0;left:0;z-index:30;pointer-events:none}
  .fab{pointer-events:auto;position:absolute;right:18px;bottom:calc(18px + var(--safe-b));
    background:var(--teal);color:var(--bg);border:none;padding:15px 20px;min-height:48px;
    font-size:15px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.4)}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:none;align-items:flex-end}
  .scrim.show{display:flex}
  .sheet{width:100%;background:var(--surface);
    padding:20px 18px calc(20px + var(--safe-b));border-top:1px solid var(--line)}
  @media (min-width:900px){.scrim{align-items:center;justify-content:center}
    .sheet{max-width:460px;border:1px solid var(--line)}}
  .sheet h2{margin:2px 0 16px;font-size:17px}
  .sheet label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px;
    text-transform:uppercase;letter-spacing:.06em}
  .sheet input,.sheet select{width:100%;background:var(--surface2);border:1px solid var(--line);
    color:var(--text);font-size:16px;padding:13px 12px;font-family:inherit}
  .est-row{display:flex;gap:8px}
  .est-row input{flex:1}
  .est-row select{flex:0 0 130px}
  .sheet .hint{font-size:12px;color:var(--muted);margin-top:6px}
  .sheet .actions{display:flex;gap:10px;margin-top:20px}
  .btn{flex:1;padding:14px;min-height:48px;font-size:15px;font-weight:700;
    border:1px solid var(--line);background:var(--surface2);color:var(--text)}
  .btn.primary{background:var(--teal);color:var(--bg);border-color:var(--teal)}

  .menu .sheet button.mi{display:block;width:100%;text-align:left;background:none;border:none;
    color:var(--text);font-size:16px;padding:15px 4px;min-height:48px;border-bottom:1px solid var(--line)}
  .menu .sheet button.mi.del{color:var(--red)}
  .menu .sheet button.mi:last-child{border-bottom:none}
</style>
</head>
<body>
<a class="skip" href="#main">Aller au contenu</a>

<header>
  <button id="menuBtn" aria-label="Ouvrir la liste des projets" aria-expanded="false" aria-controls="sidebar">☰</button>
  <h1>Chrono<span class="dot">·</span>App</h1>
  <div id="pill" class="active-pill" role="status" aria-live="polite">0 active</div>
</header>

<div id="sidebarScrim"></div>
<nav id="sidebar" aria-label="Projets">
  <h2>Projets</h2>
  <ul id="projList"></ul>
  <button class="newproj" data-addproj="1">+ Nouveau projet</button>
</nav>

<main id="main">
  <div class="tabbar" role="tablist" aria-label="Vues">
    <button class="tab" id="tabTasks" role="tab" aria-selected="true">Tâches du projet</button>
    <button class="tab" id="tabDash" role="tab" aria-selected="false">Dashboard actives</button>
  </div>
  <div id="list"></div>
</main>

<div class="fab-holder"><button class="fab" id="fab">+ Tâche</button></div>

<!-- Feuille édition -->
<div class="scrim" id="editScrim">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <h2 id="editTitle">Nouvelle tâche</h2>
    <label for="editName">Nom</label>
    <input id="editName" placeholder="Ex. Maquette page d'accueil" autocomplete="off" />
    <div id="estBlock">
      <label for="editEst">Temps estimé — 0 = aucun</label>
      <div class="est-row">
        <input id="editEst" type="number" inputmode="numeric" min="0" value="1" />
        <select id="editUnit" aria-label="Unité du temps estimé">
          <option value="1">minutes</option>
          <option value="60" selected>heures</option>
          <option value="1440">jours</option>
        </select>
      </div>
      <div class="hint">Une ligne devient rouge quand le temps passé dépasse l'estimation.</div>
    </div>
    <div class="actions">
      <button class="btn" id="editCancel">Annuler</button>
      <button class="btn primary" id="editSave">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Menu contextuel -->
<div class="scrim menu" id="menuScrim">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <h2 id="menuTitle">Options</h2>
    <button class="mi" id="miEdit">Modifier le nom / l'estimation</button>
    <button class="mi" id="miReset">Remettre le compteur à zéro</button>
    <button class="mi del" id="miDelete">Supprimer</button>
    <button class="mi" id="miClose">Fermer</button>
  </div>
</div>

<script>
"use strict";
const KEY = "chronoapp.v1";           // NE JAMAIS CHANGER : garantit les données entre mises à jour
const SCHEMA = 2;
const uid = () => Math.random().toString(36).slice(2, 10);

// ---- Chargement + migration (les données survivent aux mises à jour) ----
function normNode(n){
  n = (n && typeof n === "object") ? n : {};
  let elapsed = Number(n.elapsed) || 0;
  if(n.running && n.startedAt){ elapsed += (Date.now() - n.startedAt) / 1000; } // fige au chargement
  return { id: n.id || uid(), name: String(n.name || "Sans nom"),
           estimate_min: Math.max(0, Number(n.estimate_min) || 0),
           elapsed, running: false };
}
function migrate(raw){
  const s = (raw && typeof raw === "object") ? raw : {};
  const out = { schema: SCHEMA, projects: [] };
  for(const p of (Array.isArray(s.projects) ? s.projects : [])){
    const np = { id: (p && p.id) || uid(), name: String((p && p.name) || "Projet"), tasks: [] };
    for(const t of (Array.isArray(p && p.tasks) ? p.tasks : [])){
      const nt = normNode(t);
      nt.subtasks = (Array.isArray(t && t.subtasks) ? t.subtasks : []).map(normNode);
      np.tasks.push(nt);
    }
    out.projects.push(np);
  }
  return out;
}
function load(){
  let raw = null;
  try{ raw = localStorage.getItem(KEY); }catch(e){}
  if(raw){
    // Copie de secours de la version brute avant toute migration
    try{ localStorage.setItem(KEY + ".backup", raw); }catch(e){}
    try{ return migrate(JSON.parse(raw)); }catch(e){}
    // JSON illisible : on garde le backup et on repart proprement
  }
  return { schema: SCHEMA, projects: [] };
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

let state = load();
let selProject = state.projects[0] ? state.projects[0].id : null;
let view = "tasks";
let openTasks = {};
let edit = null;
let menuCtx = null;
let lastToggled = null;

// ---- Temps ----
function elapsed(n){
  let e = n.elapsed || 0;
  if(n.running && n.startedAt) e += (Date.now() - n.startedAt) / 1000;
  return e;
}
function over(n){ return n.estimate_min > 0 && elapsed(n) > n.estimate_min * 60; }
function hms(s){
  s = Math.max(0, Math.floor(s));
  const j = Math.floor(s/86400), h = Math.floor((s%86400)/3600),
        m = Math.floor((s%3600)/60), x = s%60;
  const p = n => String(n).padStart(2,"0");
  if(j > 0) return `${j}j ${p(h)}h ${p(m)}m`;
  if(h > 0) return `${h}h ${p(m)}m ${p(x)}s`;
  return `${m}m ${p(x)}s`;
}
// Meilleure unité pour pré-remplir l'édition (jours > heures > minutes)
function bestUnit(estMin){
  if(estMin > 0 && estMin % 1440 === 0) return { v: estMin/1440, u: 1440 };
  if(estMin > 0 && estMin % 60 === 0)   return { v: estMin/60,   u: 60 };
  return { v: estMin, u: 1 };
}

// ---- Accès aux données ----
function project(){ return state.projects.find(p => p.id === selProject) || null; }
function findNode(id){
  for(const p of state.projects)
    for(const t of p.tasks){
      if(t.id === id) return {p, parent:null, node:t};
      for(const s of (t.subtasks||[])) if(s.id === id) return {p, parent:t, node:s};
    }
  return null;
}
function allNodes(){
  const out = [];
  for(const p of state.projects)
    for(const t of p.tasks){ out.push({p,parent:null,node:t});
      for(const s of (t.subtasks||[])) out.push({p,parent:t,node:s}); }
  return out;
}

// ---- Actions ----
function toggle(id){
  const f = findNode(id); if(!f) return;
  const n = f.node;
  if(n.running){ n.elapsed = elapsed(n); n.running = false; delete n.startedAt; }
  else { n.running = true; n.startedAt = Date.now(); }
  lastToggled = id;
  save(); render();
}
function resetNode(id){
  const f = findNode(id); if(!f) return;
  f.node.elapsed = 0; f.node.running = false; delete f.node.startedAt;
  save(); render();
}
function deleteNode(id){
  const f = findNode(id); if(!f) return;
  if(f.parent) f.parent.subtasks = f.parent.subtasks.filter(s => s.id !== id);
  else f.p.tasks = f.p.tasks.filter(t => t.id !== id);
  save(); render();
}

// ---- Sidebar ----
function openSidebar(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebarScrim").classList.add("show");
  document.getElementById("menuBtn").setAttribute("aria-expanded","true");
  const first = document.querySelector("#projList .proj-btn") || document.querySelector("#sidebar .newproj");
  if(first) first.focus();
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarScrim").classList.remove("show");
  document.getElementById("menuBtn").setAttribute("aria-expanded","false");
}

// ---- Feuilles ----
function openEdit(title, name, estMin, withEst){
  document.getElementById("editTitle").textContent = title;
  document.getElementById("editName").value = name;
  document.getElementById("estBlock").style.display = withEst ? "" : "none";
  if(withEst){
    const b = bestUnit(estMin);
    document.getElementById("editEst").value = b.v;
    document.getElementById("editUnit").value = String(b.u);
  }
  document.getElementById("editScrim").classList.add("show");
  setTimeout(() => document.getElementById("editName").focus(), 60);
}
function closeEdit(){ document.getElementById("editScrim").classList.remove("show"); edit = null; }
function addProject(){ edit = {kind:"project"}; openEdit("Nouveau projet", "", 0, false); }
function addTask(){
  if(!project()){ addProject(); return; }
  edit = {kind:"task"}; openEdit("Nouvelle tâche", "", 60, true);
}
function addSubtask(taskId){ edit = {kind:"subtask", taskId}; openEdit("Nouvelle sous-tâche", "", 30, true); }
function openEditExisting(id){
  const f = findNode(id); if(!f) return;
  edit = {kind:"edit", id};
  openEdit("Modifier", f.node.name, f.node.estimate_min, true);
}
function commitEdit(){
  if(!edit) return;
  const name = document.getElementById("editName").value.trim();
  if(!name){ document.getElementById("editName").focus(); return; }
  const val = parseFloat(document.getElementById("editEst").value);
  const unit = parseInt(document.getElementById("editUnit").value, 10);
  const est = (val >= 0) ? Math.round(val * unit) : 0;

  if(edit.kind === "project"){
    const p = {id:uid(), name, tasks:[]};
    state.projects.push(p); selProject = p.id; view = "tasks";
  } else if(edit.kind === "task"){
    project().tasks.push({id:uid(), name, estimate_min:est, elapsed:0, running:false, subtasks:[]});
  } else if(edit.kind === "subtask"){
    const t = project().tasks.find(t => t.id === edit.taskId);
    if(t){ (t.subtasks = t.subtasks||[]).push({id:uid(), name, estimate_min:est, elapsed:0, running:false});
           openTasks[t.id] = true; }
  } else if(edit.kind === "edit"){
    const f = findNode(edit.id); if(f){ f.node.name = name; f.node.estimate_min = est; }
  }
  closeEdit(); save(); render();
}
function openMenu(id){
  const f = findNode(id); if(!f) return;
  menuCtx = id;
  document.getElementById("menuTitle").textContent = f.node.name;
  document.getElementById("menuScrim").classList.add("show");
  setTimeout(() => document.getElementById("miEdit").focus(), 60);
}
function closeMenu(){ document.getElementById("menuScrim").classList.remove("show"); menuCtx = null; }

// ---- Rendu ----
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function rowHTML(n, isSub, ctx){
  const el = elapsed(n), ov = over(n), run = n.running;
  const est = n.estimate_min > 0 ? hms(n.estimate_min*60) : null;
  const pct = n.estimate_min > 0 ? Math.min(100, (el/(n.estimate_min*60))*100) : 0;
  const hasSubs = !isSub && (n.subtasks||[]).length > 0;
  const caret = isSub ? `<span class="caret empty" aria-hidden="true"></span>`
    : hasSubs
      ? `<button class="caret ${openTasks[n.id]?'open':''}" data-caret="${n.id}"
           aria-expanded="${!!openTasks[n.id]}" aria-label="Sous-tâches de ${escapeHtml(n.name)}">▶</button>`
      : `<span class="caret empty" aria-hidden="true">·</span>`;
  return `<div class="row ${isSub?'sub':''} ${run?'running':''}">
      ${caret}
      <div class="meta" ${!isSub&&hasSubs?`data-open="${n.id}"`:''}>
        ${ctx?`<div class="name dim">${escapeHtml(ctx)}</div>`:''}
        <div class="name">${escapeHtml(n.name)}</div>
        <div class="time">
          ${run?'<span class="reclight" aria-hidden="true"></span>':''}
          <span class="val mono">${hms(el)}</span>
          ${est?`<span class="mono">/ ${est}</span>`:''}
          ${ov?'<span class="over-flag">DÉPASSÉ</span>':''}
        </div>
        ${n.estimate_min>0?`<div class="bar ${ov?'over':''}"><i style="width:${pct}%"></i></div>`:''}
      </div>
      <button class="play ${run?'on':''}" data-toggle="${n.id}"
        aria-label="${run?'Mettre en pause':'Démarrer'} ${escapeHtml(n.name)}" aria-pressed="${run}">${run?'❚❚':'▶'}</button>
      <button class="kebab" data-menu="${n.id}" aria-label="Options pour ${escapeHtml(n.name)}">⋮</button>
    </div>`;
}

function render(){
  // Sidebar projets (avec nombre d'actives par projet)
  const ul = document.getElementById("projList");
  ul.innerHTML = state.projects.map(p => {
    const nRun = p.tasks.reduce((a,t) => a + (t.running?1:0) + (t.subtasks||[]).filter(s=>s.running).length, 0);
    return `<li><button class="proj-btn" data-proj="${p.id}" aria-current="${p.id===selProject}">
      <span>${escapeHtml(p.name)}</span>
      <span class="count ${nRun?'live':''}">${nRun?nRun+' ▶':(p.tasks.length+' tâches')}</span>
    </button></li>`;
  }).join("");

  document.getElementById("tabTasks").setAttribute("aria-selected", view==="tasks");
  document.getElementById("tabDash").setAttribute("aria-selected", view==="dash");
  document.getElementById("fab").style.display = view==="tasks" ? "" : "none";

  const list = document.getElementById("list");

  if(view === "dash"){
    // ---- Dashboard structuré par projet ----
    const groups = state.projects
      .map(p => {
        const rows = [];
        for(const t of p.tasks){
          if(t.running) rows.push({parent:null, node:t});
          for(const s of (t.subtasks||[])) if(s.running) rows.push({parent:t, node:s});
        }
        rows.sort((a,b) => {
          const oa = over(a.node)?1:0, ob = over(b.node)?1:0;
          if(oa !== ob) return ob - oa;
          return elapsed(b.node) - elapsed(a.node);
        });
        return {p, rows, nOver: rows.filter(r => over(r.node)).length,
                maxEl: rows.length ? Math.max(...rows.map(r => elapsed(r.node))) : 0};
      })
      .filter(g => g.rows.length)
      .sort((a,b) => (b.nOver?1:0) - (a.nOver?1:0) || b.maxEl - a.maxEl);

    if(!groups.length){
      list.innerHTML = `<div class="empty">Aucune tâche active.<br>Lance un timer depuis un projet pour la voir apparaître ici.</div>`;
    } else {
      list.innerHTML = groups.map(g =>
        `<section aria-label="Projet ${escapeHtml(g.p.name)}">
           <h2 class="group-h">${escapeHtml(g.p.name)}
             <span class="mono" style="color:var(--muted)">· ${g.rows.length} active${g.rows.length>1?'s':''}</span>
             ${g.nOver?`<span class="over-n">· ${g.nOver} dépassée${g.nOver>1?'s':''}</span>`:''}
           </h2>
           <div class="card">${g.rows.map(r => rowHTML(r.node, false, r.parent ? r.parent.name + ' ›' : null)).join('')}</div>
         </section>`
      ).join("");
    }
  } else {
    const p = project();
    if(!p){
      list.innerHTML = `<div class="empty"><b>Aucun projet.</b><br>Ouvre le menu ☰ puis « + Nouveau projet ».</div>`;
    } else if(!p.tasks.length){
      list.innerHTML = `<h2 class="group-h">${escapeHtml(p.name)}</h2>
        <div class="empty"><b>${escapeHtml(p.name)}</b> n'a pas encore de tâche.<br>Touche « + Tâche » en bas à droite.</div>`;
    } else {
      list.innerHTML = `<h2 class="group-h">${escapeHtml(p.name)}</h2>` + p.tasks.map(t => {
        let html = `<div class="card">${rowHTML(t, false, null)}`;
        if(openTasks[t.id]){
          (t.subtasks||[]).forEach(s => { html += rowHTML(s, true, null); });
          html += `<button class="addline addsub" data-addsub="${t.id}">+ Sous-tâche</button>`;
        }
        html += `</div>`;
        return html;
      }).join("");
    }
  }

  // Bandeau
  const running = allNodes().filter(x => x.node.running);
  const overN = running.filter(x => over(x.node)).length;
  const pill = document.getElementById("pill");
  pill.className = "active-pill" + (overN ? " over" : running.length ? " live" : "");
  pill.textContent = overN ? `${running.length} active · ${overN} dépassée`
                           : `${running.length} active${running.length>1?'s':''}`;
}

// ---- Événements ----
document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-toggle],[data-menu],[data-proj],[data-addproj],[data-caret],[data-open],[data-addsub]");
  if(!t) return;
  if(t.dataset.toggle) toggle(t.dataset.toggle);
  else if(t.dataset.menu) openMenu(t.dataset.menu);
  else if(t.dataset.proj){ selProject = t.dataset.proj; view = "tasks"; closeSidebar(); render(); }
  else if(t.dataset.addproj){ closeSidebar(); addProject(); }
  else if(t.dataset.addsub) addSubtask(t.dataset.addsub);
  else if(t.dataset.caret || t.dataset.open){
    const id = t.dataset.caret || t.dataset.open;
    openTasks[id] = !openTasks[id]; render();
  }
});
document.getElementById("menuBtn").onclick = () =>
  document.getElementById("sidebar").classList.contains("open") ? closeSidebar() : openSidebar();
document.getElementById("sidebarScrim").onclick = closeSidebar;
document.getElementById("tabTasks").onclick = () => { view = "tasks"; render(); };
document.getElementById("tabDash").onclick  = () => { view = "dash"; render(); };
document.getElementById("fab").onclick = addTask;

document.getElementById("editCancel").onclick = closeEdit;
document.getElementById("editSave").onclick = commitEdit;
document.getElementById("editScrim").addEventListener("click", (e)=>{ if(e.target.id==="editScrim") closeEdit(); });
document.getElementById("editName").addEventListener("keydown", (e)=>{ if(e.key==="Enter") commitEdit(); });
document.getElementById("editEst").addEventListener("keydown", (e)=>{ if(e.key==="Enter") commitEdit(); });

document.getElementById("miEdit").onclick   = () => { const id=menuCtx; closeMenu(); openEditExisting(id); };
document.getElementById("miReset").onclick  = () => { const id=menuCtx; closeMenu(); if(confirm("Remettre le compteur à zéro ?")) resetNode(id); };
document.getElementById("miDelete").onclick = () => { const id=menuCtx; const f=findNode(id); closeMenu(); if(confirm(`Supprimer « ${f?f.node.name:''} » ?`)) deleteNode(id); };
document.getElementById("miClose").onclick  = closeMenu;
document.getElementById("menuScrim").addEventListener("click",(e)=>{ if(e.target.id==="menuScrim") closeMenu(); });

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape"){ closeEdit(); closeMenu(); closeSidebar(); }
  // ESPACE : play/pause de la dernière ligne utilisée (hors saisie de texte)
  if(e.key === " " && !/^(INPUT|SELECT|TEXTAREA|BUTTON)$/.test(document.activeElement.tagName)){
    if(lastToggled){ e.preventDefault(); toggle(lastToggled); }
  }
});

// ---- Boucle 1 s ----
setInterval(() => {
  if(allNodes().some(x => x.node.running)){ save(); render(); }
}, 1000);

// ---- Alerte de fermeture si des timers tournent ----
window.addEventListener("beforeunload", (e) => {
  if(allNodes().some(x => x.node.running)){
    e.preventDefault();
    e.returnValue = "Des tâches sont encore actives. Quitter ?";
    return e.returnValue;
  }
});
document.addEventListener("visibilitychange", () => { if(document.hidden) save(); });

// ---- Service worker : réseau d'abord, mises à jour automatiques ----
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js", {updateViaCache:"none"})
    .then((reg) => { setInterval(() => reg.update(), 10000); })
    .catch(()=>{});
}

render();
</script>
</body>
</html>
